[pytest]
# Chạy: (trong thư mục heart-disease)  python -m pytest
testpaths = tests
pythonpath = .
addopts = -ra -q

# Mọi cảnh báo (kể cả DeprecationWarning) đều bị coi là lỗi -> test thất bại
# để đảm bảo code/notebook chạy KHÔNG warning.
filterwarnings =
    error
    # Cảnh báo hạ tầng của kernel Jupyter/zmq trên Windows (không phải từ code dự án).
    ignore:Proactor event loop does not implement add_reader:RuntimeWarning
    ignore::DeprecationWarning:dateutil.*
    ignore::DeprecationWarning:jupyter_client.*
